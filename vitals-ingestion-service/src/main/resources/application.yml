server:
  port: 8081

spring:
  application:
    name: vitals-ingestion-service

  datasource:
    url: jdbc:h2:mem:vitalsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

# Noms des exchanges et queues RabbitMQ
rabbitmq:
  exchange:
    vitals: vitals.exchange
  routing-key:
    vitals: vitals.routing.key
  queue:
    vitals: vitals.queue

logging:
  level:
    com.chronic: DEBUG