server:
  port: 8082

spring:
  application:
    name: rules-engine-service

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

# Queues consommées (provenant de vitals-ingestion-service)
rabbitmq:
  exchange:
    vitals: vitals.exchange
    alert: alert.exchange
  routing-key:
    vitals: vitals.routing.key
    alert: alert.routing.key
  queue:
    vitals: vitals.queue
    alert: alert.queue

logging:
  level:
    com.chronic: DEBUG