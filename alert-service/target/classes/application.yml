server:
  port: 8083

spring:
  application:
    name: alert-service

  datasource:
    url: jdbc:h2:mem:alertdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

  # ── Configuration Spring Mail ────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:adamsorouri@gmail.com}
    password: ${MAIL_PASSWORD:ddjbenkamjgskock}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

# Expéditeur des emails d'alerte
alert:
  mail:
    from: ${MAIL_FROM:alertes@clinique-chronique.fr}
    from-name: "Plateforme Suivi Chronique"

rabbitmq:
  exchange:
    alert: alert.exchange
  routing-key:
    alert: alert.routing.key
  queue:
    alert: alert.queue

logging:
  level:
    com.chronic: DEBUG
    org.springframework.mail: DEBUG